<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <title>Piano Color</title>
</head>
<body>

    <section id="menu" class="tela-menu">

        <div class="menu-container">
            <h1>PIANO-COLOR</h1>
            <h3>Como jogar ?</h3>
            <ol type="I">
                <li class="regra1">Na tela, irá aparecer uma combinação de duas cores.</li>
                <li class="regra2">Você deve adivinhar a junção dessas duas cores.</li>
                <li class="regra3">A cor que você acha correta estará no teclado virtual.</li>
                <li class="regra4">Após acertar uma sequência você pode escutar a melodia final, divirta-se!</li>
            </ol>
        </div> 

        <button class="btn-menu"  onclick="iniciarjogo()" >Jogar</button>

    </section>

    <section id="jogo" style="display: none;">
        <div class="jogo-container">
            <!--Pergunta-->
            <div class="pergunta">
                <div id="cor1" class="cores" ></div>
                <span class="mais">+</span>
                <div id="cor2" class="cores"></div>
            </div>
            
            <div id="feedback" class="feedback"></div>
         
        </div>

        <div class="piano">

        <!-- Teclas brancas -->
        <div class="key white" data-color="red"></div>
        <div class="key white" data-color="blue"></div>
        <div class="key white" data-color="yellow"></div>
        <div class="key white" data-color="purple"></div>
        <div class="key white" data-color="green"></div>
        <div class="key white" data-color="orange"></div>
        <div class="key white" data-color="pink"></div>

        <!-- Teclas pretas -->
        <div class="key black" style="left: 60px;"  ></div>
        <div class="key black" style="left: 120px;" ></div>
        <div class="key black" style="left: 240px;" ></div>
        <div class="key black" style="left: 300px;" ></div>
        <div class="key black" style="left: 360px;" ></div>

    </div>

    </section>
    
    <script src="script.js"></script>

</body>
</html>
