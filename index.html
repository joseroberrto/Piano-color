<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <title>Piano Color</title>
</head>
<body>

    <section id="menu" class="tela-menu">

        <div class="menu-container">
            <h1>PIANO-COLOR</h1>
            <h3>Como jogar ?</h3>
            <ol type="I">
                <li class="regra1">Na tela, irá aparecer uma combinação de duas cores.</li>
                <li class="regra2">Você deve adivinhar a junção dessas duas cores.</li>
                <li class="regra3">A cor que você acha correta estará no teclado virtual.</li>
                <li class="regra4">Após acertar uma sequência você pode escutar a melodia final, divirta-se!</li>
            </ol>
        </div> 

        <button class="btn-menu"  onclick="iniciarjogo()" >Jogar</button>

    </section>

    <section id="jogo" style="display: none;">
        <div class="jogo-container">
            <!--Pergunta-->
            
            <div class="melodia1">
                <div id="cor1" class="cor-green" ></div>
                <span class="mais">+</span>
                <div id="cor2" class="cor-yellow-orange"></div>
                <span class="mais">+</span>
                <div id="cor3" class="cor-yellow-green" ></div>
            </div>
            
            <div id="feedback" class="feedback"></div>

            <div class="piano">
        <!-- Teclas brancas quinta oitava :) -->
                <div class="key white c5" data-color="red" data-note="c5"></div>
                <div class="key white d5" data-color="blue" data-note="d5"></div>
                <div class="key white e5" data-color="yellow" data-note="e5"></div>
                <div class="key white f5" data-color="purple" data-note="f5"></div>
                <div class="key white g5" data-color="green" data-note="g5"></div>
                <div class="key white a5" data-color="orange" data-note="a5"></div>
                <div class="key white b5" data-color="pink" data-note="b5"></div>
        <!-- Teclas pretas quinta oitava :) -->
                <div class="key black c#5" style="left: 60px;" data-note="cs5" data-color="red-purple"></div>
                <div class="key black d#5" style="left: 120px;" data-note="ds5" data-color="yellow-green"></div>
                <div class="key black f#5" style="left: 240px;" data-note="fs5" data-color="blue-green"></div>
                <div class="key black g#5" style="left: 300px;" data-note="gs5" data-color="blue-purple"></div>
                <div class="key black a#5" style="left: 360px;" data-note="as5" data-color="yellow-orange"></div>
        <!-- Teclas brancas sexta oitava ;) -->
                <div class="key white c6" data-color="red2" data-note="c6"></div>
                <div class="key white d6" data-color="blue2" data-note="d6"></div>
                <div class="key white e6" data-color="yellow2"data-note="e6"></div>
                <div class="key white f6" data-color="purple2" data-note="f6"></div>
                <div class="key white g6" data-color="green2" data-note="g6"></div>
                <div class="key white a6" data-color="orange2" data-note="a6"></div>
                <div class="key white b6" data-color="pink2" data-note="b6"></div>
        <!-- Teclas pretas sexta oitava ;) -->
                <div class="key black c#6" style="left: 480px;" data-note="cs6" data-color="red-purple2" ></div>
                <div class="key black d#6" style="left: 540px;" data-note="ds6" data-color="yellow-green2"></div>
                <div class="key black f#6" style="left: 660px;" data-note="fs6" data-color="blue-green2"></div>
                <div class="key black g#6" style="left: 720px;" data-note="gs6" data-color="blue-purple2"></div>
                <div class="key black a#6" style="left: 780px;" data-note="as6" data-color="yellow-orange2"></div>

            </div>

        </div>
    </section>
    
    <script src="js/script.js"></script>

</body>
</html>
